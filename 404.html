 </head>
 <body>
  <div id="authContainer" class="auth-container">
   <div class="auth-card">
    <div class="logo-container"><img src="https://i.top4top.io/p_35860o72q1.png" alt="شعار النظام" style="display: block; margin: 0 auto 1.5rem auto;" onerror="this.style.display='none'">
     <div class="system-title">
      ⚡ سيستم البطاريات ⚡
     </div>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
     <div class="form-group"><label class="form-label">اسم المستخدم</label> <input type="text" id="username" class="form-input" placeholder="أدخل اسم المستخدم" required>
     </div>
     <div class="form-group"><label class="form-label">كلمة المرور</label> <input type="password" id="password" class="form-input" placeholder="أدخل كلمة المرور" required>
     </div><button type="submit" class="btn-login">تسجيل الدخول</button>
    </form>
   </div>
  </div>
  <div id="mainContainer" class="main-container">
   <header class="header">
    <div class="header-content">
     <div class="header-logo"><img src="https://i.top4top.io/p_35860o72q1.png" alt="شعار النظام" onerror="this.style.display='none'">
      <div class="header-title" id="headerTitle">
       ⚡ سيستم البطاريات ⚡
      </div>
     </div>
     <div class="user-info">
      <div class="user-badge" id="userBadge"></div><button class="btn-logout" onclick="handleLogout()">تسجيل الخروج</button>
     </div>
    </div>
   </header>
   <main class="content">
    <div id="searchModeSelector" class="search-mode-selector"><button class="mode-btn" onclick="switchSearchMode('size')"> 🔋 البحث بمقاس البطارية </button> <button class="mode-btn" onclick="switchSearchMode('car')"> 🚗 البحث بأسماء السيارات </button>
    </div>
    <div id="sizeSearchSection" class="search-section active">
     <div class="search-title">
      🔋 ابحث عن مقاس البطارية
     </div>
     <div class="dropdown-group"><label class="dropdown-label">🔋 اختر أو اكتب مقاس البطارية</label>
      <div class="dropdown-container"><input type="text" id="sizeInput" class="dropdown-input" placeholder="مثال: DA95, LN5, 70D23L..." autocomplete="off" oninput="filterDropdown('size')" onfocus="showDropdown('size')"> <span class="dropdown-arrow" id="sizeArrow">▼</span>
       <div id="sizeList" class="dropdown-list"></div>
      </div>
     </div>
    </div>
    <div id="carSearchSection" class="search-section">
     <div class="search-title" id="searchLabel">
      🚗 ابحث عن بطارية سيارتك
     </div>
     <div class="dropdown-group" id="makeGroup"><label class="dropdown-label">🚗 اختر الشركة المصنعة</label>
      <div class="dropdown-container"><input type="text" id="makeInput" class="dropdown-input" placeholder="اكتب أو اختر الشركة..." autocomplete="off" oninput="filterDropdown('make')" onfocus="showDropdown('make')"> <span class="dropdown-arrow" id="makeArrow">▼</span>
       <div id="makeList" class="dropdown-list"></div>
      </div>
     </div>
     <div class="dropdown-group" id="modelGroup" style="display: none;"><label class="dropdown-label">🚙 اختر الموديل</label>
      <div class="dropdown-container"><input type="text" id="modelInput" class="dropdown-input" placeholder="اختر الموديل..." autocomplete="off" oninput="filterDropdown('model')" onfocus="showDropdown('model')"> <span class="dropdown-arrow" id="modelArrow">▼</span>
       <div id="modelList" class="dropdown-list"></div>
      </div>
     </div>
     <div class="dropdown-group" id="yearGroup" style="display: none;"><label class="dropdown-label">📅 اختر السنة</label>
      <div class="dropdown-container"><input type="text" id="yearInput" class="dropdown-input" placeholder="اختر السنة..." autocomplete="off" oninput="filterDropdown('year')" onfocus="showDropdown('year')"> <span class="dropdown-arrow" id="yearArrow">▼</span>
       <div id="yearList" class="dropdown-list"></div>
      </div>
     </div>
    </div>
    <div id="results" class="results-section"></div>
    <div id="dashboardSection" class="dashboard-section">
      <div style="color:#FFC107;text-align:center;padding:2rem;">🔋 لوحة التحكم متاحة بعد تسجيل الدخول</div>
    </div>
    <div id="loading" class="loading">
     <div class="spinner"></div>
     <div style="color: #FFC107; font-weight: bold; font-size: 1.1rem;">
      جاري تحميل البيانات...
     </div>
    </div>
   </main>
  </div>
  <script>
        // نسخة مختصرة قابلة للعمل داخل iframe
        const CAR_SHEET_ID = '1tUjEj-1FtAqewhJiRcC4dgGwgrxhb5OjKxGWEojFzlg';
        const BATTERY_SHEET_ID = '1WghSWhC-NJ0h--afoaR0ydzTP8ULw7N3tBDgToXoLVk';
        const CAR_SHEET_URL = `https://docs.google.com/spreadsheets/d/${CAR_SHEET_ID}/export?format=csv&gid=0`;
        const BATTERY_SHEET_URL = `https://docs.google.com/spreadsheets/d/${BATTERY_SHEET_ID}/export?format=csv&gid=0`;

        const USERS = {
            Abdullah: { password: 'portarage1', role: 'كول سنتر', isStaff: true },
            Suaad: { password: 'portarage2', role: 'كول سنتر', isStaff: true },
            Laila: { password: 'portarage3', role: 'كول سنتر', isStaff: true },
            Nasser: { password: 'portarage4', role: 'كول سنتر', isStaff: true },
            Khalifa: { password: 'portarage5', role: 'كول سنتر', isStaff: true },
            Azam: { password: 'portarage6', role: 'كول سنتر', isStaff: true },
            Abdulwahab: { password: 'portarage7', role: 'كول سنتر', isStaff: true },
            Bashar: { password: 'portarage8', role: 'كول سنتر', isStaff: true },
            Ali: { password: 'portarage9', role: 'كول سنتر', isStaff: true },
            Sabah: { password: 'portarage10', role: 'كول سنتر', isStaff: true },
            Hamad: { password: 'portarage12', role: 'كول سنتر', isStaff: true },
            Fawzi: { password: 'portarage12', role: 'كول سنتر', isStaff: true },
            Mohamad: { password: 'portarage7896', role: 'المحاسب', isStaff: false },
            Salem: { password: 'portarage7887', role: 'المدير', isStaff: false }
        };

        let currentUser = null;
        let batteryData = [];

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else current += char;
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
        }

        async function loadBatteryData() {
            const response = await fetch(BATTERY_SHEET_URL);
            const text = await response.text();
            const rows = text.split('\n').filter(row => row.trim());
            batteryData = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = parseCSVLine(rows[i]);
                if (cols[0]) {
                    batteryData.push({
                        size: cols[0] || '',
                        brand: cols[1] || '',
                        price: parseFloat(cols[3]) || 0,
                        salePrice: parseFloat(cols[4]) || 0,
                        fkStock: parseFloat(cols[5]) || 0,
                        mStock: parseFloat(cols[6]) || 0
                    });
                }
            }
            populateSizeDropdown();
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            if (USERS[username] && USERS[username].password === password) {
                currentUser = { username, ...USERS[username] };
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('userBadge').textContent = `${currentUser.role}: ${username}`;
                loadBatteryData();
            } else {
                errorMsg.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('loginForm').reset();
        }

        function populateSizeDropdown() {
            const sizes = [...new Set(batteryData.map(b => b.size))].sort();
            const sizeList = document.getElementById('sizeList');
            sizeList.innerHTML = sizes.map(size => `<div class="dropdown-item" onclick="selectSize('${size}')">${size}</div>`).join('');
        }

        function showDropdown(type) {
            const list = document.getElementById(`${type}List`);
            const arrow = document.getElementById(`${type}Arrow`);
            if (list && list.innerHTML.trim() !== '') {
                list.classList.add('show');
                arrow.classList.add('open');
            }
        }

        function filterDropdown(type) {
            const input = document.getElementById(`${type}Input`);
            const list = document.getElementById(`${type}List`);
            const query = (input.value || '').trim().toUpperCase();
            const items = list.querySelectorAll('.dropdown-item');
            items.forEach(item => {
                item.style.display = item.textContent.toUpperCase().includes(query) ? 'block' : 'none';
            });
            list.classList.add('show');
        }

        function switchSearchMode(mode) {
            const isCar = mode === 'car';
            document.getElementById('carSearchSection').style.display = isCar ? 'block' : 'none';
            document.getElementById('sizeSearchSection').style.display = isCar ? 'none' : 'block';
        }

        function selectSize(size) {
            document.getElementById('sizeInput').value = size;
            document.getElementById('sizeList').classList.remove('show');
            document.getElementById('sizeArrow').classList.remove('open');
            const resultsDiv = document.getElementById('results');
            const all = batteryData.filter(b => b.size.toUpperCase() === size.toUpperCase() && (b.fkStock > 0 || b.mStock > 0));
            resultsDiv.innerHTML = all.length ? `<div class="battery-result"><div class="battery-title">🔋 بطارية بمقاس ${size}</div><div class="prices-table-container" style="display:block;">${generateTable(all)}</div></div>` : '<div style="text-align:center;padding:2rem;color:#FFC107;">لا توجد نتائج</div>';
            resultsDiv.style.display = 'block';
        }

        function generateTable(all) {
            return `<table class="prices-table"><thead><tr><th>الماركة</th><th>المقاس</th><th>سعر الشراء</th><th>سعر البيع</th><th>المخزون الرئيسي</th></tr></thead><tbody>${all.map(b => `<tr><td class="brand-cell">${b.brand}</td><td class="price-cell">${b.size}</td><td>${b.price} دك</td><td>${b.salePrice} دك</td><td>${b.fkStock + b.mStock}</td></tr>`).join('')}</tbody></table>`;
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown-container')) {
                document.querySelectorAll('.dropdown-list').forEach(list => list.classList.remove('show'));
                document.querySelectorAll('.dropdown-arrow').forEach(arrow => arrow.classList.remove('open'));
            }
        });
  </script>
 </body>
</html>
