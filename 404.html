<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full" style="background:#0a0a0a;">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسعار خدمات بورتراج</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    
    * {
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #0a0a0a;
    }
    
    .dashboard-wrapper {
      height: 100%;
      width: 100%;
      display: none;
      grid-template-columns: 200px 1fr;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
      gap: 0;
    }
    
    /* Sidebar */
    .sidebar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      border-left: 1px solid #F2BC1B;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 8px;
      gap: 4px;
      position: relative;
      z-index: 100;
    }
    
    .sidebar::-webkit-scrollbar {
      width: 5px;
    }
    
    .sidebar::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    .sidebar::-webkit-scrollbar-thumb {
      background: #F2BC1B;
      border-radius: 3px;
    }
    
    .logo-section {
      text-align: center;
      padding: 8px 0 10px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 6px;
    }
    
    .logo-section img {
      max-width: 80px;
      height: auto;
      margin: 0 auto 4px;
    }
    
    .logo-section h1 {
      font-size: 13px;
      font-weight: 700;
      color: #F2BC1B;
      margin: 0;
    }
    
    .service-item {
      background: #252525;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 6px 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    
    .service-item:hover {
      background: #303030;
      border-color: #F2BC1B;
    }
    
    .service-item.active {
      background: #F2BC1B;
      border-color: #F2BC1B;
      color: #000;
      font-weight: 700;
    }
    
    .service-item .icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
      color: #F2BC1B;
    }
    
    .service-item.active .icon {
      color: #000;
    }
    
    .service-item .label {
      flex: 1;
      font-size: 11px;
      color: #F2BC1B;
      font-weight: 600;
    }
    
    .service-item.active .label {
      color: #000;
    }
    
    /* Main Content */
    .main-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0a0a;
      height: 100%;
    }
    
    /* Header Bar */
    .header-bar {
      background: #1a1a1a;
      border-bottom: 1px solid #F2BC1B;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 10px;
    }
    
    .header-bar h2 {
      font-size: 13px;
      font-weight: 700;
      color: #F2BC1B;
      margin: 0;
    }
    
    .header-bar .status {
      font-size: 10px;
      color: #10b981;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Content Area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      grid-auto-rows: max-content;
      gap: 5px;
      align-content: start;
    }
    
    .content-area::-webkit-scrollbar {
      width: 6px;
    }
    
    .content-area::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    .content-area::-webkit-scrollbar-thumb {
      background: #F2BC1B;
      border-radius: 3px;
    }
    
    /* Form Sections */
    .form-section {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 7px;
      height: fit-content;
    }
    
    .form-section.full-width {
      grid-column: 1 / -1;
    }

    #insuranceResults {
      grid-column: 1 / -1;
      width: 100%;
      box-sizing: border-box;
      padding: 0;
      margin-top: 5px;
    }

    #insuranceResults .data-table-container {
      grid-column: 1 / -1;
      width: 100%;
      margin: 0 0 10px 0;
    }

    #insuranceResults .table-scroll,
    #insuranceResults > div > .table-scroll {
      overflow-x: auto;
      width: 100%;
    }

    #insuranceResults .data-table {
      width: 100%;
      table-layout: auto;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #F2BC1B;
      margin: 0 0 5px 0;
      padding-bottom: 3px;
      border-bottom: 1px solid #333;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 5px;
    }
    
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .form-field label {
      font-size: 10px;
      color: #777;
      font-weight: 600;
    }
    
    .form-control {
      background: #262626;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 5px 8px;
      color: #fff;
      font-size: 11px;
      transition: all 0.2s ease;
    }
    
    .form-control:focus {
      outline: none;
      border-color: #F2BC1B;
      background: #2d2d2d;
    }
    
    .form-control::placeholder {
      color: #555;
    }
    
    /* Buttons */
    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
    }
    
    .btn-option {
      background: #252525;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 6px 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      flex: 1;
      min-width: 60px;
    }
    
    .btn-option:hover {
      background: #303030;
      border-color: #F2BC1B;
    }
    
    .btn-option.active {
      background: #F2BC1B;
      border-color: #F2BC1B;
      color: #000;
      font-weight: 700;
    }
    
    .btn-primary {
      background: #F2BC1B;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      margin-top: 5px;
    }
    
    .btn-primary:hover {
      background: #d9a616;
    }

    .btn-inline {
      width: auto;
      margin-top: 0;
      padding: 5px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 10px;
    }

    .btn-outline {
      background: transparent;
      color: #F2BC1B;
      border: 1px solid #F2BC1B;
    }

    .btn-outline:hover {
      background: #F2BC1B;
      color: #000;
    }

    .btn-back {
      background: #F2BC1B;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-back:hover {
      background: #d9a616;
    }
    
    /* Data Table */
    .data-table-container {
      grid-column: 1 / -1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 280px;
    }
    
    .table-header {
      background: #F2BC1B;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }
    
    .table-scroll {
      overflow-y: auto;
      overflow-x: auto;
      max-height: 230px;
    }
    
    .table-scroll::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    
    .table-scroll::-webkit-scrollbar-track {
      background: #262626;
    }
    
    .table-scroll::-webkit-scrollbar-thumb {
      background: #F2BC1B;
      border-radius: 2px;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
    }
    
    .data-table th {
      background: #222;
      color: #F2BC1B;
      font-size: 10px;
      font-weight: 700;
      padding: 6px;
      text-align: center;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }
    
    .data-table td {
      padding: 6px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    
    .data-table tr:hover td {
      background: #242424;
    }
    
    .data-table .highlight {
      color: #F2BC1B;
      font-weight: 600;
    }
    
    /* Info Boxes */
    .info-box {
      background: #1a3a52;
      border: 1px solid #2a5a8a;
      border-radius: 3px;
      padding: 6px 8px;
      font-size: 10px;
      color: #7bafde;
      margin-top: 5px;
      line-height: 1.4;
    }
    
    .warning-box {
      background: #3a3018;
      border: 1px solid #d4860b;
      border-radius: 3px;
      padding: 6px 8px;
      font-size: 10px;
      color: #e8c66a;
      margin-top: 5px;
      line-height: 1.4;
    }
    
    .error-box {
      background: #3a1818;
      border: 1px solid #d42a2a;
      border-radius: 3px;
      padding: 6px 8px;
      font-size: 10px;
      color: #f88a8a;
      margin-top: 5px;
      line-height: 1.4;
    }
    
    /* Login Page Styles */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .login-box {
      background: linear-gradient(145deg, #1a1a1a 0%, #262626 100%);
      border: 1px solid #F2BC1B;
      border-radius: 8px;
      padding: 30px 40px;
      width: 350px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(242, 188, 27, 0.2);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #F2BC1B;
      margin: 0 0 8px 0;
    }
    
    .login-header p {
      font-size: 12px;
      color: #888;
      margin: 0;
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .login-field label {
      font-size: 12px;
      color: #F2BC1B;
      font-weight: 600;
    }
    
    .login-input {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-size: 13px;
      transition: all 0.3s ease;
    }
    
    .login-input:focus {
      outline: none;
      border-color: #F2BC1B;
      background: #0f0f0f;
    }
    
    .login-button {
      background: #F2BC1B;
      border: none;
      border-radius: 6px;
      padding: 11px;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    
    .login-button:hover {
      background: #d9a616;
    }
    
    .hidden {
      display: none !important;
    }

    /* Responsive for small screens */
    @media (max-width: 768px) {
      .dashboard-wrapper {
        grid-template-columns: 150px 1fr;
      }

      .sidebar {
        padding: 6px;
        gap: 3px;
      }

      .logo-section img {
        max-width: 60px;
      }

      .content-area {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 4px;
        padding: 4px;
      }

      .service-item .label {
        font-size: 10px;
      }

      .form-section {
        padding: 6px;
      }
    }
  </style>
 </head>
 <body class="h-full" style="background:#0a0a0a;">

   <!-- Main Content -->

     <h2 id="serviceTitle">اختر خدمة</h2>

       <div class="status"><span class="status-dot"></span> <span>متصل</span></div>

     <div style="grid-column: 1 / -1; text-align: center; padding: 20px;">
      <img src="https://i.top4top.io/p_35860o72q1.png" alt="بورتراج" style="max-width: 100px; height: auto; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto;">

  <script>
    // Simple login system
    const GOOGLE_SHEET_ID = '1x2ongtstODqEEWh_jAwN8zLHjsYeIppk8EH_Q1CXMzk';
    const USERS_SHEET_NAME = 'users';
    const GOOGLE_SHEET_URL = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${USERS_SHEET_NAME}`;
    
    let usersData = [];
    let isAuthenticated = false;
    
    function checkAuthStatus() {
      const authToken = localStorage.getItem('authToken');
      const rememberMe = localStorage.getItem('rememberMe') === 'true';
      
      if (authToken && rememberMe) {
        isAuthenticated = true;
        showMainApp();
      } else {
        showLogin();
      }
    }
    
    async function loadUsers() {
      try {
        const response = await fetch(GOOGLE_SHEET_URL);
        const text = await response.text();
        const jsonString = text.substring(47).slice(0, -2);
        const data = JSON.parse(jsonString);
        
        usersData = [];
        if (data.table && data.table.rows) {
          for (let i = 1; i < data.table.rows.length; i++) {
            const row = data.table.rows[i];
            if (row.c && row.c[0] && row.c[1]) {
              const username = row.c[0].v;
              const password = row.c[1].v;
              if (username && password) {
                usersData.push({ username: String(username), password: String(password) });
              }
            }
          }
        }
        return true;
      } catch (error) {
        console.error('Error loading users:', error);
        return false;
      }
    }
    
    function verifyLogin(username, password) {
      return usersData.some(user => 
        user.username === username && user.password === password
      );
    }
    
    function showLogin() {
      document.getElementById('loginContainer').classList.remove('hidden');
      document.querySelector('.dashboard-wrapper').style.display = 'none';
      document.getElementById('logoutButton').style.display = 'none';
    }
    
    function showMainApp() {
      document.getElementById('loginContainer').classList.add('hidden');
      document.querySelector('.dashboard-wrapper').style.display = 'grid';
      document.getElementById('logoutButton').style.display = 'flex';
    }
    
    (async function initLogin() {
      await loadUsers();
      checkAuthStatus();
      
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const loginButton = document.getElementById('loginButton');
      const logoutButton = document.getElementById('logoutButton');
      
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        loginButton.disabled = true;
        loginButton.textContent = 'جاري التحقق...';
        loginError.classList.add('hidden');
        
        await new Promise(resolve => setTimeout(resolve, 300));
        
        if (verifyLogin(username, password)) {
          const authToken = btoa(username + ':' + Date.now());
          localStorage.setItem('authToken', authToken);
          localStorage.setItem('rememberMe', true);
          localStorage.setItem('currentUser', username);
          
          isAuthenticated = true;
          showMainApp();
          loginForm.reset();
          loginButton.disabled = false;
          loginButton.textContent = 'دخول';
        } else {
          loginError.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
          loginError.classList.remove('hidden');
          loginButton.disabled = false;
          loginButton.textContent = 'دخول';
        }
      });
      
      logoutButton.addEventListener('click', () => {
        if (confirm('هل أنت متأكد من رغبتك في تسجيل الخروج؟')) {
          localStorage.removeItem('authToken');
          localStorage.removeItem('rememberMe');
          localStorage.removeItem('currentUser');
          isAuthenticated = false;
          showLogin();
        }
      });
    })();

    // Service selection
    document.addEventListener('click', (e) => {
      const serviceItem = e.target.closest('.service-item');
      if (serviceItem) {
        document.querySelectorAll('.service-item').forEach(item => {
          item.classList.remove('active');
        });
        
        serviceItem.classList.add('active');
        
        const serviceName = serviceItem.dataset.service;
        
        const serviceTitles = {
          'tow': 'خدمة الونشات',
          'battery': 'خدمات البطارية',
          'fuel': 'خدمة الوقود',
          'unlock': 'فتح قفل السيارة',
          'tire': 'خدمات التواير',
          'mechanical': 'الخدمات الميكانيكية',
          'carwash': 'غسيل السيارات',
          'protection': 'الحماية والتغيم',
          'insurance': 'التأمينات',
          'subscription': 'الاشتراكات',
